name: Build EPUB

on:
  push:
    paths:
      - .github/workflows/build-epub.yml
      - scripts/build_all.py
      - actions_epub
      - styles/epub.css
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools + Bengali fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc calibre fonts-noto-core fonts-noto-extra fonts-lohit-beng-bengali

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Delete previous EPUB release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete epub-books --yes --cleanup-tag || echo "No previous release found, continuing"

      - name: Build all epub books (fresh, no skipping)
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
        run: python scripts/build_all.py --format epub

      - name: Upload epub books to a new GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(output/epub/*.epub)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No epub files were generated"
            exit 1
          fi
          gh release create epub-books --title "EPUB Books" --notes "Auto-generated EPUB books. Fully regenerated on every run of the Build EPUB workflow." "${files[@]}"