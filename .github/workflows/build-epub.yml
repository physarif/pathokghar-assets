name: Build EPUB

on:
  push:
    paths:
      - actions_epub
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools + Bengali fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc calibre fonts-noto-core fonts-noto-extra fonts-lohit-beng-bengali

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch list of already-published epub files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view epub-books --json assets --jq '.assets[].name' > existing_epub.txt 2>/dev/null || touch existing_epub.txt
          echo "Found $(wc -l < existing_epub.txt) existing epub file(s) in the release"

      - name: Build new epub books
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
        run: python scripts/build_all.py --format epub --existing-file existing_epub.txt

      - name: Upload new epub books to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(output/epub/*.epub)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Nothing new to upload"
            exit 0
          fi
          gh release view epub-books >/dev/null 2>&1 || gh release create epub-books --title "EPUB Books" --notes "Auto-generated EPUB books. Files are added here by the Build EPUB workflow."
          gh release upload epub-books "${files[@]}" --clobber