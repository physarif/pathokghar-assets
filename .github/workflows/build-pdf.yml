name: Build PDF
 
on:
  push:
    paths:
      - .github/workflows/build-pdf.yml
      - scripts/build_ebooks.py
      - scripts/render_pdf.js
      - package.json
      - actions_pdf
      - styles/pdf.css
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bengali fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core fonts-noto-extra fonts-lohit-beng-bengali

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps (Playwright + Paged.js)
        run: npm install

      - name: Install Playwright's Chromium
        run: npx playwright install --with-deps chromium

      - name: Build new pdf books
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
        run: python scripts/build_ebooks.py --format pdf

      - name: Upload PDFs to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: output/pdf/*.pdf
          tag_name: pdf-books
          name: "PDF Books (Latest Build)"
          body: |
            Pathokghar Bengali book collection in PDF format.
            ðŸ“„ A4 page size, large 40px font for comfortable reading
            ðŸ“š Includes cover + title page + chapters
            ðŸ”¢ Bengali page numbers, running footer with book name and à¦ªà¦¾à¦ à¦• à¦˜à¦° link
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
