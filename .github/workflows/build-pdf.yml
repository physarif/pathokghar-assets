name: Build PDF

on:
  push:
    paths:
      - .github/workflows/build-pdf.yml
      - scripts/build_ebooks.py
      - scripts/render_pdf.js
      - package.json
      - actions_pdf
      - styles/pdf.css
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bengali fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core fonts-noto-extra fonts-lohit-beng-bengali

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pypdf

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ubuntu-latest runners already ship with Google Chrome pre-installed,
      # so we skip pagedjs-cli's own puppeteer downloading a *second* copy
      # of Chromium (a large download that was making this step slow/flaky
      # in earlier runs) and just point it at the one that's already there.
      - name: Install Node deps (Paged.js via pagedjs-cli)
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm install

      - name: Locate pre-installed Chrome
        id: chrome
        run: |
          CHROME_PATH="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium)"
          if [ -z "$CHROME_PATH" ]; then
            echo "No pre-installed Chrome/Chromium found on this runner!" >&2
            exit 1
          fi
          echo "Found Chrome at: $CHROME_PATH"
          echo "path=$CHROME_PATH" >> "$GITHUB_OUTPUT"

      - name: Build new pdf books
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.path }}
        run: python scripts/build_ebooks.py --format pdf

      - name: Upload assembled PDF-HTML (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-debug-html
          path: work/**/*.pdf.html
          if-no-files-found: warn
          retention-days: 7

      - name: Upload PDFs to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: output/pdf/*.pdf
          tag_name: pdf-books
          name: "PDF Books (Latest Build)"
          body: |
            Pathokghar Bengali book collection in PDF format.
            ðŸ“„ Cover + donate page: A6. Chapters: phone-screen ratio, large 36px font
            ðŸ“š Includes cover + title page + chapters
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
