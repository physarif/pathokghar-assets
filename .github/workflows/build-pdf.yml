name: Build PDF

on:
  push:
    paths:
      - .github/workflows/build-pdf.yml
      - scripts/build_all.py
      - actions_pdf
      - styles/pdf.css
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools + Bengali fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc calibre fonts-noto-core fonts-noto-extra fonts-lohit-beng-bengali

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pypdf

      - name: Build new pdf books
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
        run: python scripts/build_all.py --format pdf

      - name: Upload PDFs to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: output/pdf/*.pdf
          tag_name: pdf-books
          name: "PDF Books (Latest Build)"
          body: |
            Pathokghar Bengali book collection in PDF format.
            📱 Mobile-optimized: cover + title page at A6, chapters at a 9:16 phone-screen ratio, 22px font
            📚 Includes cover + title page + chapters
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}