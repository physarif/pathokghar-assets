name: Build PDF

on:
  push:
    paths:
      - .github/workflows/build-pdf.yml
      - scripts/build_ebooks.py
      - scripts/render_pdf.js
      - package.json
      - actions_pdf
      - styles/pdf.css
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bengali fonts + Chromium runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-core fonts-noto-extra fonts-lohit-beng-bengali \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # npm install also downloads pagedjs-cli's own bundled Chromium
      # (via its puppeteer dependency) — no separate browser-install step
      # needed, unlike the old Playwright-based approach.
      - name: Install Node deps (Paged.js via pagedjs-cli)
        run: npm install

      - name: Build new pdf books
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
        run: python scripts/build_ebooks.py --format pdf

      - name: Upload assembled PDF-HTML (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-debug-html
          path: work/**/*.pdf.html
          if-no-files-found: warn
          retention-days: 7

      - name: Upload PDFs to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: output/pdf/*.pdf
          tag_name: pdf-books
          name: "PDF Books (Latest Build)"
          body: |
            Pathokghar Bengali book collection in PDF format.
            📄 A4 page size, large 40px font for comfortable reading
            📚 Includes cover + title page + chapters
            🔢 Bengali page numbers, running footer with book name and পাঠক ঘর link
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}