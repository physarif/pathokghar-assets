name: Build PDF

on:
  push:
    paths:
      - actions_pdf
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools + Bengali fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc calibre fonts-noto-core fonts-noto-extra fonts-lohit-beng-bengali

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build new pdf books
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
        run: python scripts/build_all.py --format pdf

      - name: Commit + push new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/pdf
          git diff --cached --quiet && echo "Nothing new to commit" || git commit -m "Add new pdf books [skip ci]"
          git push

      - name: Upload PDFs to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: output/pdf/*.pdf
          tag_name: pdf-books-latest
          name: "PDF Books (Latest Build)"
          body: |
            Pathokghar Bengali book collection in PDF format.
            ðŸ“± Mobile-optimized: ~100mm width, 22px font
            ðŸ“š Includes cover + title page + chapters
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}