name: Build MOBI

on:
  push:
    paths:
      - .github/workflows/build-mobi.yml
      - scripts/build_ebooks.py
      - actions_mobi
      - styles/mobi.css
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools + Bengali fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc calibre fonts-noto-core fonts-noto-extra fonts-lohit-beng-bengali

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build new mobi books
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
        run: python scripts/build_ebooks.py --format mobi

      - name: Upload MOBIs to Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          files: output/mobi/*.mobi
          tag_name: mobi-books
          name: "MOBI Books (Latest Build)"
          body: |
            Pathokghar Bengali book collection in MOBI format.
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}