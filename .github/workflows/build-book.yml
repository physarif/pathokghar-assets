name: Build New Books (EPUB + PDF)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system tools (pandoc + calibre)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc calibre

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build all new books + create releases
        env:
          FIREBASE_AUTH: ${{ secrets.FIREBASE_DB_AUTH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_all.py